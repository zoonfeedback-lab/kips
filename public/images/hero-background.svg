<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background (simulating building) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5aa0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a3a7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f4a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Building structure (simplified windows) -->
  <g fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15">
    <!-- Building lines -->
    <line x1="100" y1="50" x2="100" y2="500"/>
    <line x1="200" y1="50" x2="200" y2="500"/>
    <line x1="300" y1="50" x2="300" y2="500"/>
    <line x1="400" y1="50" x2="400" y2="500"/>
    <line x1="500" y1="50" x2="500" y2="500"/>
    <line x1="600" y1="50" x2="600" y2="500"/>
    
    <line x1="50" y1="100" x2="650" y2="100"/>
    <line x1="50" y1="150" x2="650" y2="150"/>
    <line x1="50" y1="200" x2="650" y2="200"/>
    <line x1="50" y1="250" x2="650" y2="250"/>
    <line x1="50" y1="300" x2="650" y2="300"/>
    <line x1="50" y1="350" x2="650" y2="350"/>
    <line x1="50" y1="400" x2="650" y2="400"/>
    <line x1="50" y1="450" x2="650" y2="450"/>
  </g>
  
  <!-- Window highlights -->
  <g fill="#87ceeb" opacity="0.2">
    <rect x="80" y="70" width="35" height="35" rx="2"/>
    <rect x="180" y="70" width="35" height="35" rx="2"/>
    <rect x="280" y="70" width="35" height="35" rx="2"/>
    <rect x="380" y="70" width="35" height="35" rx="2"/>
    <rect x="480" y="70" width="35" height="35" rx="2"/>
    <rect x="580" y="70" width="35" height="35" rx="2"/>
    
    <rect x="130" y="120" width="35" height="35" rx="2"/>
    <rect x="230" y="120" width="35" height="35" rx="2"/>
    <rect x="330" y="120" width="35" height="35" rx="2"/>
    <rect x="430" y="120" width="35" height="35" rx="2"/>
    <rect x="530" y="120" width="35" height="35" rx="2"/>
  </g>
  
  <!-- Accent light rays -->
  <g stroke="#d4a840" stroke-width="1" opacity="0.15">
    <line x1="200" y1="0" x2="150" y2="300"/>
    <line x1="400" y1="0" x2="350" y2="300"/>
    <line x1="600" y1="0" x2="550" y2="300"/>
  </g>
  
  <!-- Decorative circles (bokeh effect) -->
  <circle cx="150" cy="150" r="80" fill="#d4a840" opacity="0.05"/>
  <circle cx="500" cy="400" r="120" fill="#2a9d8f" opacity="0.05"/>
  <circle cx="100" cy="500" r="100" fill="#d4a840" opacity="0.05"/>
  
  <!-- Text overlay hint -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.1">KIPS Academy Campus</text>
</svg>