<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a3a7a" stroke="#d4a840" stroke-width="3"/>
  
  <!-- Sun rays effect -->
  <g stroke="#d4a840" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="10" x2="100" y2="25" />
    <line x1="100" y1="175" x2="100" y2="190" />
    <line x1="10" y1="100" x2="25" y2="100" />
    <line x1="175" y1="100" x2="190" y2="100" />
    <line x1="25" y1="25" x2="36" y2="36" />
    <line x1="164" y1="164" x2="175" y2="175" />
    <line x1="175" y1="25" x2="164" y2="36" />
    <line x1="36" y1="164" x2="25" y2="175" />
  </g>
  
  <!-- Central circle with gold border -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#d4a840" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="#d4a840" stroke-width="1.5"/>
  
  <!-- Inner decorative shape (book/open book representation) -->
  <path d="M 75 85 Q 75 70 100 70 Q 125 70 125 85" fill="none" stroke="#d4a840" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="70" x2="100" y2="105" stroke="#d4a840" stroke-width="2"/>
  <path d="M 75 95 L 85 100 L 100 98 L 115 100 L 125 95" stroke="#d4a840" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- KIPS text -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#d4a840" text-anchor="middle">KIPS</text>
  
  <!-- Decorative dots -->
  <circle cx="60" cy="100" r="3" fill="#d4a840"/>
  <circle cx="140" cy="100" r="3" fill="#d4a840"/>
</svg>